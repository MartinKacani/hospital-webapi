openapi: 3.0.0
servers:
  - description: Cluster Endpoint
    url: /api
info:
  description: MedBed - Bed reservation and hospitalization planning for Web-In-Cloud system
  version: "1.0.0"
  title: MedBed Api
  contact:
    email: xkacani@stuba.sk
  license:
    name: CC BY 4.0
    url: "https://creativecommons.org/licenses/by/4.0/"
tags:
- name: reservations
  description: Reservation management (for referring doctors)
- name: stays
  description: Hospitalization stay management (for department staff)
- name: departments
  description: Hospital department management

paths:
  "/medbed/department":
    post:
      tags:
        - departments
      summary: Creates a new department
      operationId: createDepartment
      description: Use this method to initialize a new hospital department in the system
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Department"
            examples:
              request-sample:
                $ref: "#/components/examples/DepartmentExample"
        description: Department details to store
        required: true
      responses:
        "200":
          description: Value of stored department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
        "400":
          description: Missing mandatory properties of input object.
        "409":
          description: Department with the specified id already exists

  "/medbed/department/{departmentId}":
    delete:
      tags:
        - departments
      summary: Deletes a specific department
      operationId: deleteDepartment
      description: Use this method to delete the specific department from the system.
      parameters:
        - in: path
          name: departmentId
          description: pass the id of the particular department
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Department deleted
        "404":
          description: Department with such ID does not exist

  "/medbed/{departmentId}/reservations":
    get:
      tags:
        - reservations
      summary: Returns list of reservations for the department
      operationId: getReservations
      description: Returns all reservations for the given department
      parameters:
        - in: path
          name: departmentId
          description: pass the id of the particular department
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
              examples:
                response:
                  $ref: "#/components/examples/ReservationsListExample"
        "404":
          description: Department with such ID does not exist
    post:
      tags:
        - reservations
      summary: Creates a new reservation
      operationId: createReservation
      description: Use this method to create a new reservation for hospitalization.
      parameters:
        - in: path
          name: departmentId
          description: pass the id of the particular department
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Reservation"
            examples:
              request-sample:
                $ref: "#/components/examples/ReservationExample"
        description: Reservation to create
        required: true
      responses:
        "200":
          description: Created reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "400":
          description: Missing mandatory properties of input object.
        "404":
          description: Department with such ID does not exist
        "409":
          description: Reservation with the specified id already exists

  "/medbed/{departmentId}/reservations/{reservationId}":
    get:
      tags:
        - reservations
      summary: Returns details of a single reservation
      operationId: getReservation
      description: Returns details of the specified reservation
      parameters:
        - in: path
          name: departmentId
          description: pass the id of the particular department
          required: true
          schema:
            type: string
        - in: path
          name: reservationId
          description: pass the id of the particular reservation
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reservation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
              examples:
                response:
                  $ref: "#/components/examples/ReservationExample"
        "404":
          description: Department or Reservation with such ID does not exist
    put:
      tags:
        - reservations
      summary: Updates a specific reservation
      operationId: updateReservation
      description: Use this method to update an existing reservation.
      parameters:
        - in: path
          name: departmentId
          description: pass the id of the particular department
          required: true
          schema:
            type: string
        - in: path
          name: reservationId
          description: pass the id of the particular reservation
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Reservation"
            examples:
              request:
                $ref: "#/components/examples/ReservationExample"
        description: Reservation data to update
        required: true
      responses:
        "200":
          description: Updated reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "400":
          description: Invalid input data
        "404":
          description: Department or Reservation with such ID does not exist
    delete:
      tags:
        - reservations
      summary: Cancels/deletes a reservation
      operationId: deleteReservation
      description: Use this method to cancel a reservation.
      parameters:
        - in: path
          name: departmentId
          description: pass the id of the particular department
          required: true
          schema:
            type: string
        - in: path
          name: reservationId
          description: pass the id of the particular reservation
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Reservation deleted
        "404":
          description: Department or Reservation with such ID does not exist

  "/medbed/{departmentId}/stays":
    get:
      tags:
        - stays
      summary: Returns list of hospitalization stays
      operationId: getStays
      description: Returns all hospitalization stays for the given department
      parameters:
        - in: path
          name: departmentId
          description: pass the id of the particular department
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of stays
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HospitalizationStay"
              examples:
                response:
                  $ref: "#/components/examples/StaysListExample"
        "404":
          description: Department with such ID does not exist
    post:
      tags:
        - stays
      summary: Creates a new hospitalization stay
      operationId: createStay
      description: Use this method to create a hospitalization stay, optionally linked to a reservation.
      parameters:
        - in: path
          name: departmentId
          description: pass the id of the particular department
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HospitalizationStay"
            examples:
              request-sample:
                $ref: "#/components/examples/StayExample"
        description: Hospitalization stay to create
        required: true
      responses:
        "200":
          description: Created hospitalization stay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HospitalizationStay"
        "400":
          description: Missing mandatory properties of input object.
        "404":
          description: Department with such ID does not exist
        "409":
          description: Stay with the specified id already exists

  "/medbed/{departmentId}/stays/{stayId}":
    get:
      tags:
        - stays
      summary: Returns details of a single hospitalization stay
      operationId: getStay
      description: Returns details of the specified hospitalization stay
      parameters:
        - in: path
          name: departmentId
          description: pass the id of the particular department
          required: true
          schema:
            type: string
        - in: path
          name: stayId
          description: pass the id of the particular stay
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stay details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HospitalizationStay"
        "404":
          description: Department or Stay with such ID does not exist
    put:
      tags:
        - stays
      summary: Updates a specific hospitalization stay
      operationId: updateStay
      description: Use this method to update an existing hospitalization stay (change dates, transfer bed, add notes).
      parameters:
        - in: path
          name: departmentId
          description: pass the id of the particular department
          required: true
          schema:
            type: string
        - in: path
          name: stayId
          description: pass the id of the particular stay
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HospitalizationStay"
        description: Stay data to update
        required: true
      responses:
        "200":
          description: Updated stay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HospitalizationStay"
        "400":
          description: Invalid input data
        "404":
          description: Department or Stay with such ID does not exist
    delete:
      tags:
        - stays
      summary: Cancels/ends a hospitalization stay
      operationId: deleteStay
      description: Use this method to cancel or end a hospitalization stay.
      parameters:
        - in: path
          name: departmentId
          description: pass the id of the particular department
          required: true
          schema:
            type: string
        - in: path
          name: stayId
          description: pass the id of the particular stay
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Stay deleted
        "404":
          description: Department or Stay with such ID does not exist

components:
  schemas:
    Department:
      type: object
      required: [id, name, code]
      properties:
        id:
          type: string
          example: cardiology
          description: Unique identifier of the department
        name:
          type: string
          example: Kardiologické oddelenie
          description: Human readable display name of the department
        code:
          type: string
          example: KARD
          description: Short department code
        reservations:
          type: array
          items:
            $ref: '#/components/schemas/Reservation'
        stays:
          type: array
          items:
            $ref: '#/components/schemas/HospitalizationStay'

    Reservation:
      type: object
      required: [id, patientId, patientName, department, reason, from, to]
      properties:
        id:
          type: string
          example: res-001
          description: Unique identifier of the reservation
        patientId:
          type: string
          example: 460527-jozef-pucik
          description: Unique patient identifier
        patientName:
          type: string
          example: Jožko Púčik
          description: Full name of the patient
        department:
          type: string
          example: cardiology
          description: Target department ID
        reason:
          type: string
          example: Plánovaná hospitalizácia po operácii srdca
          description: Reason for the reservation
        from:
          type: string
          format: date-time
          example: "2025-06-01T08:00:00Z"
          description: Start date and time of the reservation
        to:
          type: string
          format: date-time
          example: "2025-06-07T12:00:00Z"
          description: End date and time of the reservation
        contactInfo:
          type: string
          example: "+421 900 123 456"
          description: Contact information for the patient or referring doctor
        status:
          type: string
          enum: [pending, confirmed, cancelled]
          example: pending
          description: Current status of the reservation
        cancelReason:
          type: string
          example: Pacient odmietol hospitalizáciu
          description: Reason for cancellation (if cancelled)
        note:
          type: string
          example: Vyžaduje jednolôžkovú izbu
          description: Note from the hospital
        roomOrAmbulance:
          type: string
          example: "Ambulancia 3B"
          description: Assigned room or ambulance

    HospitalizationStay:
      type: object
      required: [id, patientId, patientName, department, roomNumber, bedNumber, from, to]
      properties:
        id:
          type: string
          example: stay-001
          description: Unique identifier of the stay
        reservationId:
          type: string
          example: res-001
          description: ID of the linked reservation (optional)
        patientId:
          type: string
          example: 460527-jozef-pucik
          description: Unique patient identifier
        patientName:
          type: string
          example: Jožko Púčik
          description: Full name of the patient
        department:
          type: string
          example: cardiology
          description: Department where the patient is staying
        roomNumber:
          type: string
          example: "3B"
          description: Room number
        bedNumber:
          type: string
          example: "2"
          description: Bed number within the room
        from:
          type: string
          format: date-time
          example: "2025-06-01T08:00:00Z"
          description: Start of hospitalization
        to:
          type: string
          format: date-time
          example: "2025-06-07T12:00:00Z"
          description: End of hospitalization
        status:
          type: string
          enum: [planned, active, completed, cancelled]
          example: planned
          description: Current status of the stay
        cancelReason:
          type: string
          example: Pacient predčasne prepustený
          description: Reason for cancellation or early discharge
        notes:
          type: string
          example: Pacient vyžaduje diétu č. 4
          description: Clinical notes for the stay

  examples:
    DepartmentExample:
      summary: Kardiologické oddelenie
      value:
        id: cardiology
        name: Kardiologické oddelenie
        code: KARD
    ReservationExample:
      summary: Sample reservation
      value:
        id: res-001
        patientId: 460527-jozef-pucik
        patientName: Jožko Púčik
        department: cardiology
        reason: Plánovaná hospitalizácia po operácii srdca
        from: "2025-06-01T08:00:00Z"
        to: "2025-06-07T12:00:00Z"
        contactInfo: "+421 900 123 456"
        status: pending
    ReservationsListExample:
      summary: List of reservations
      value:
        - id: res-001
          patientId: 460527-jozef-pucik
          patientName: Jožko Púčik
          department: cardiology
          reason: Plánovaná hospitalizácia po operácii srdca
          from: "2025-06-01T08:00:00Z"
          to: "2025-06-07T12:00:00Z"
          status: pending
        - id: res-002
          patientId: 780907-ferdinand-tre
          patientName: Ferdinand Tretí
          department: cardiology
          reason: Kontrolné vyšetrenie
          from: "2025-06-03T09:00:00Z"
          to: "2025-06-04T15:00:00Z"
          status: confirmed
    StayExample:
      summary: Sample hospitalization stay
      value:
        id: stay-001
        reservationId: res-001
        patientId: 460527-jozef-pucik
        patientName: Jožko Púčik
        department: cardiology
        roomNumber: "3B"
        bedNumber: "2"
        from: "2025-06-01T08:00:00Z"
        to: "2025-06-07T12:00:00Z"
        status: planned
    StaysListExample:
      summary: List of hospitalization stays
      value:
        - id: stay-001
          reservationId: res-001
          patientId: 460527-jozef-pucik
          patientName: Jožko Púčik
          department: cardiology
          roomNumber: "3B"
          bedNumber: "2"
          from: "2025-06-01T08:00:00Z"
          to: "2025-06-07T12:00:00Z"
          status: active
        - id: stay-002
          patientId: 780907-ferdinand-tre
          patientName: Ferdinand Tretí
          department: cardiology
          roomNumber: "3B"
          bedNumber: "1"
          from: "2025-06-03T09:00:00Z"
          to: "2025-06-05T15:00:00Z"
          status: planned
