apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- deployment.yaml
- service.yaml

configMapGenerator:
  - name: tjmk-hospital-webapi-mongodb-init
    files:
      - params/init-db.js
  - name: tjmk-hospital-webapi-config
    literals:
      - database=tjmk-hospital
      - collection=hospital
patches:
- path: patches/webapi.deployment.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: tjmk-hospital-webapi